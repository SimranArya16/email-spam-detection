<!DOCTYPE html>
<html>
<head>
    <title>Email Spam Detection</title>
    <style>
        /* Page background */
        body {
            background: #1f1f2e; /* dark navy-ish */
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Card container */
        .container {
            background: #2e2e44; /* slightly lighter dark card */
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0px 15px 30px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 650px;
            width: 90%;
        }

        h2 {
            color: #ffd369; /* bright yellow */
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #555;
            background-color: #3c3c55;
            color: #f0f0f0;
            resize: none;
            font-size: 16px;
        }

        input[type="submit"] {
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #ff6b81, #6a5cff);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }

        input[type="submit"]:hover {
            background: linear-gradient(45deg, #ff4d6a, #4b3aff);
            transform: scale(1.05);
        }

        .result {
            margin-top: 30px;
            font-size: 18px;
            font-weight: bold;
        }

        .spam {
            color: #ff4d4d; /* bright red */
        }

        .not-spam {
            color: #2ed573; /* bright green */
        }

        p {
            margin: 8px 0;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Email Spam Detection</h2>

        <form method="POST">
            <textarea name="email_text" rows="6" placeholder="Enter your email here..."></textarea>
            <br>
            <input type="submit" value="Check Spam">
        </form>

        {% if prediction %}
            <div class="result">
                <p>Result: <span class="{% if prediction == 'Spam' %}spam{% else %}not-spam{% endif %}">{{ prediction }}</span></p>
                <p>Spam Probability: {{ probability }}%</p>
                <p>Email: {{ email }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
