<!DOCTYPE html>
<html>
<head>
    <title>Email Spam Detection</title>
    <style>
       
        body {
            background: #1f1f2e; 
            font-family: 'Times New Roman', Times, serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

     
        .container {
            background: #2e2e44;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0px 15px 30px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 650px;
            width: 90%;
        }

        h2 {
            color: #ffd369; 
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #555;
            background-color: #3c3c55;
            color: #f0f0f0;
            resize: none;
            font-size: 16px;
        }

        input[type="submit"] {
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #ff6b81, #6a5cff);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }

        input[type="submit"]:hover {
            background: linear-gradient(45deg, #ff4d6a, #4b3aff);
            transform: scale(1.05);
        }

        
        .result {
            margin-top: 30px;
            font-size: 16px;
            font-weight: bold;
            text-align: left; 
            padding: 20px;
            border-radius: 12px;
            word-wrap: break-word; 
        }

        .spam {
            background-color: rgba(255, 77, 77, 0.8); 
            color: #ffffff; 
        }

        .not-spam {
            background-color: rgba(46, 213, 115, 0.8);
            color: #ffffff; 
        }

        p {
            margin: 6px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Email Spam Detection</h2>

        <form method="POST">
            <textarea name="email_text" rows="6" placeholder="Enter your email here..." required></textarea>
            <br>
            <input type="submit" value="Check Spam">
        </form>

        {% if prediction %}
            <div class="result {% if prediction == 'Spam' %}spam{% else %}not-spam{% endif %}">
                <p><strong>Result:</strong> {{ prediction }}</p>
                <p><strong>Spam Probability:</strong> {{ probability }}%</p>
                <p><strong>Email:</strong> {{ email }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
